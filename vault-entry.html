<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(registrations){for(let r of registrations)r.unregister();});caches.keys().then(function(names){for(let name of names)caches.delete(name);});}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ListaCarro — ParkLog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="vault-entry.css">
  <script src="version-check.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Login Overlay -->
  <div id="login-overlay" class="login-overlay" role="dialog" aria-modal="true" aria-label="Login">
    <div class="login-card card">
      <div class="login-logo">🅿️</div>
      <h2 data-i18n="login.title">Acceso — VaultEntry</h2>
      <div class="form-group">
        <label class="form-label" for="login-username" data-i18n="login.username">Nombre de usuario</label>
        <input type="text" id="login-username" class="form-input" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password" data-i18n="login.password">Contraseña</label>
        <input type="password" id="login-password" class="form-input" autocomplete="current-password">
      </div>
      <div id="login-error" class="form-error hidden" role="alert"></div>
      <button id="login-btn" class="btn btn-primary btn-block">
        <span data-i18n="login.submit">Entrar</span>
      </button>
      <a href="index2.html" class="login-back-link" data-i18n="login.back">← Volver al inicio</a>
    </div>
  </div>

  <!-- Offline indicator -->
  <div id="offline-bar" class="offline-bar" role="alert" aria-live="polite">
    <span>⚠️ </span><span data-i18n="msg.offline">Sin conexión</span>
  </div>

  <!-- Header -->
  <header class="page-header">
    <div>
      <a href="index2.html" class="header-back" aria-label="Back">
        <i data-lucide="arrow-left" style="width:20px;height:20px;color:#fff"></i>
      </a>
    </div>
    <div class="header-center">
      <h1 data-i18n="entry.title">ListaCarro</h1>
      <span class="subtitle" data-i18n="entry.subtitle">בדיקת רכבים</span>
    </div>
    <div class="header-right">
      <button id="header-user-btn" class="header-user-btn hidden" title="Sign out"></button>
      <div class="lang-toggle" id="lang-toggle">
        <button class="lang-option" data-lang="es">ES 🇪🇸</button>
        <button class="lang-option" data-lang="he">HE 🇮🇱</button>
      </div>
    </div>
  </header>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Main content -->
  <main class="page-content">
    <div class="ve-container">

      <!-- Entry Form Card -->
      <div class="card ve-form-card">

        <!-- Tipo Field — FIRST, determines which identifier fields appear -->
        <div class="form-group">
          <label class="form-label" data-i18n="entry.tipo.label">Tipo de Vehículo</label>
          <div class="toggle-group" role="radiogroup" aria-label="Entry type">
            <button type="button" class="toggle-option active" data-tipo="auto" role="radio" aria-checked="true">
              🚗 <span data-i18n="entry.tipo.auto">Automóvil</span>
            </button>
            <button type="button" class="toggle-option" data-tipo="moto" role="radio" aria-checked="false">
              🛵 <span data-i18n="entry.tipo.moto">Motocicleta</span>
            </button>
            <button type="button" class="toggle-option" data-tipo="persona" role="radio" aria-checked="false">
              🚶 <span data-i18n="entry.tipo.persona">Persona</span>
            </button>
          </div>
        </div>

        <!-- Vehicle Fields (auto / moto) -->
        <div id="vehicle-fields">
          <div class="form-group">
            <label class="form-label" for="placa-input" data-i18n="entry.placa.label">Número de Placa</label>
            <div class="placa-input-wrapper">
              <input
                type="text"
                id="placa-input"
                class="form-input placa-input"
                maxlength="10"
                autocomplete="off"
                autocapitalize="characters"
                spellcheck="false"
                data-i18n="entry.placa.placeholder"
                data-i18n-attr="placeholder"
              >
              <button id="placa-clear" class="placa-clear" type="button" aria-label="Clear plate">✕</button>
              <div id="placa-spinner" class="placa-spinner hidden">
                <i data-lucide="loader-2" class="spin"></i>
              </div>
            </div>
            <div id="placa-error" class="form-error hidden" role="alert"></div>
          </div>
        </div>

        <!-- Person Fields (persona only, hidden by default) -->
        <div id="person-fields" class="hidden">
          <div class="form-group">
            <label class="form-label" for="first-name-input" data-i18n="entry.person.firstName.label">Nombre</label>
            <input
              type="text"
              id="first-name-input"
              class="form-input"
              maxlength="50"
              autocomplete="given-name"
              data-i18n="entry.person.firstName.placeholder"
              data-i18n-attr="placeholder"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="last-name-input" data-i18n="entry.person.lastName.label">Apellido</label>
            <input
              type="text"
              id="last-name-input"
              class="form-input"
              maxlength="50"
              autocomplete="family-name"
              data-i18n="entry.person.lastName.placeholder"
              data-i18n-attr="placeholder"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="id-number-input" data-i18n="entry.person.idNumber.label">Cédula</label>
            <div class="placa-input-wrapper">
              <input
                type="text"
                id="id-number-input"
                class="form-input"
                maxlength="12"
                inputmode="numeric"
                autocomplete="off"
                data-i18n="entry.person.idNumber.placeholder"
                data-i18n-attr="placeholder"
              >
              <div id="id-spinner" class="placa-spinner hidden">
                <i data-lucide="loader-2" class="spin"></i>
              </div>
            </div>
            <div id="id-error" class="form-error hidden" role="alert"></div>
          </div>
        </div>

        <!-- Vehicle / Person Status Badge -->
        <div id="vehicle-status" class="hidden" role="status" aria-live="polite"></div>

        <!-- Notes Field -->
        <div class="form-group">
          <label class="form-label" for="notes-input" data-i18n="entry.notes.label">Observaciones</label>
          <textarea
            id="notes-input"
            class="form-textarea"
            rows="2"
            maxlength="300"
            data-i18n="entry.notes.placeholder"
            data-i18n-attr="placeholder"
          ></textarea>
          <div class="form-hint">
            <span id="char-count">0</span>/300 <span data-i18n="notes.charCount">caracteres</span>
          </div>
        </div>

        <!-- Submit Button -->
        <button id="submit-btn" class="btn btn-primary btn-block ve-submit" disabled>
          <i data-lucide="save" style="width:20px;height:20px"></i>
          <span data-i18n="entry.submit">Guardar Entrada</span>
        </button>

      </div>

      <!-- Confirmation Banner (hidden by default) -->
      <div id="confirmation" class="ve-confirmation hidden" role="status" aria-live="polite"></div>

      <!-- Session Entries List -->
      <div id="session-list" class="card session-list">
        <div class="session-list-header">
          <h3>
            <i data-lucide="sparkles" style="width:18px;height:18px;color:var(--color-success)"></i>
            <span data-i18n="session.title">Entradas en esta sesión</span>
            <span id="session-count" class="session-count hidden">0</span>
          </h3>
          <button id="copy-session-btn" class="btn btn-sm btn-secondary hidden">
            <i data-lucide="copy" style="width:16px;height:16px"></i>
            <span data-i18n="session.copy">Copiar nuevos</span>
          </button>
        </div>
        <div id="session-items" class="session-items">
          <div class="empty-state" style="padding:var(--space-lg)">
            <p class="text-sm text-muted" data-i18n="session.empty">Aún no hay entradas en esta sesión</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Visit History Modal -->
  <div id="ve-history-modal" class="ve-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="ve-history-title">
    <div class="ve-modal">
      <div class="ve-modal-header">
        <h3 id="ve-history-title" data-i18n="history.title">Historial de visitas</h3>
        <button id="ve-history-close" class="btn btn-ghost" aria-label="Close">✕</button>
      </div>
      <div id="ve-history-plate" class="ve-history-plate"></div>
      <div id="ve-history-body" class="ve-history-body"></div>
      <div class="ve-modal-footer">
        <button id="ve-history-copy" class="btn btn-ghost btn-sm" data-i18n="history.copy">העתק טבלה</button>
        <button id="ve-history-done" class="btn btn-primary btn-sm" data-i18n="history.close">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script src="sheets.js"></script>
  <script src="vault-entry.js"></script>
</body>
</html>
